name: Tests (MOSEK)

on:
  push:
    branches:
      - main
  pull_request_target:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # push to main / manual dispatch: already requires write access to trigger,
  # so these run immediately with no extra approval step.
  mosek-trusted:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - uses: astral-sh/setup-uv@v8.2.0
      - name: MOSEK-backed Python tests
        env:
          MSK_LICENSE: ${{ secrets.MSK_LICENSE }}
        run: |
          echo "$MSK_LICENSE" > "$HOME/mosek.lic"
          MOSEKLM_LICENSE_FILE="$HOME/mosek.lic" uv run python -c \
            "from ncpoleon.utils import is_mosek_available; assert is_mosek_available(), 'MSK_LICENSE is set but MOSEK license checkout failed'"
          MOSEKLM_LICENSE_FILE="$HOME/mosek.lic" uv run --all-extras --dev --config-setting 'build-args=--profile=dev' pytest -x
  
  approve:
    runs-on: ubuntu-latest

    steps:
    - name: Approve
      run: echo For security reasons, all workflows requiring a MOSEK license need to be approved first before running.

  # pull requests: paused until a maintainer reviews the diff and approves
  # the "Integrate Pull Request" environment.
  mosek-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    needs: [approve]
    environment:
      name: Integrate Pull Request
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - uses: astral-sh/setup-uv@v8.2.0
      - name: MOSEK-backed Python tests
        env:
          MSK_LICENSE: ${{ secrets.MSK_LICENSE }}
        run: |
          echo "$MSK_LICENSE" > "$HOME/mosek.lic"
          MOSEKLM_LICENSE_FILE="$HOME/mosek.lic" uv run python -c \
            "from ncpoleon.utils import is_mosek_available; assert is_mosek_available(), 'MSK_LICENSE is set but MOSEK license checkout failed'"
          MOSEKLM_LICENSE_FILE="$HOME/mosek.lic" uv run --all-extras --dev --config-setting 'build-args=--profile=dev' pytest -x

  # push to main / manual dispatch. workflow_dispatch also lets CodSpeed
  # itself trigger backtest performance analysis to generate baseline data.
  codspeed-trusted:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: pyproject.toml
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Write MOSEK license
        env:
          MSK_LICENSE: ${{ secrets.MSK_LICENSE }}
        run: echo "$MSK_LICENSE" > "${{ github.workspace }}/mosek.lic"
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@c145068895e045cc725ee76fcd2307624b65c3af
        env:
          MOSEKLM_LICENSE_FILE: ${{ github.workspace }}/mosek.lic
        with:
          mode: simulation
          run: uv run --config-setting 'build-args=--profile=release' pytest -x --codspeed

  # pull requests: same review gate as mosek-pr — this also checks out
  # PR-controlled code and hands it the MOSEK secret, so it needs the
  # same human approval before it's allowed to run.
  codspeed-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    needs: [approve]
    environment:
      name: Integrate Pull Request
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: pyproject.toml
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Write MOSEK license
        env:
          MSK_LICENSE: ${{ secrets.MSK_LICENSE }}
        run: echo "$MSK_LICENSE" > "${{ github.workspace }}/mosek.lic"
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@c145068895e045cc725ee76fcd2307624b65c3af
        env:
          MOSEKLM_LICENSE_FILE: ${{ github.workspace }}/mosek.lic
        with:
          mode: simulation
          run: uv run --config-setting 'build-args=--profile=release' pytest -x --codspeed