name: Tests with a MOSEK license and Coverage

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - buffer
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # push to main / manual dispatch: already requires write access to trigger,
  # so these run immediately with no extra approval step.
  trusted:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 2
      - uses: dtolnay/rust-toolchain@stable
        with:
            components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Setup compilation
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov clean --workspace
      - name: Rust tests
        run: cargo test
      - name: MOSEK-backed Python tests
        env:
          MSK_LICENSE: ${{ secrets.MSK_LICENSE }}
        run: |
          echo "$MSK_LICENSE" > "$HOME/mosek.lic"
          MOSEKLM_LICENSE_FILE="$HOME/mosek.lic" uv run python -c \
            "from ncpoleon.utils import is_mosek_available; assert is_mosek_available(), 'MOSEK license checkout failed'"
          
          MOSEKLM_LICENSE_FILE="$HOME/mosek.lic" uv run --all-extras --dev --config-setting 'build-args=--profile=dev' pytest -x --cov=ncpoleon --cov-report xml
      - name: Generate LCOV report
        run: cargo llvm-cov report --lcov --output-path coverage.lcov
      - uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.lcov,coverage.xml

  approve:
    if: github.event_name == 'pull_request_target'
    environment:
      name: Integrate Pull Request
    runs-on: ubuntu-latest

    steps:
      - name: Approve
        run: echo For security reasons, all workflows requiring a MOSEK license need to be approved first before running.

  approved:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    needs: [approve]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: true
          fetch-depth: 2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Setup compilation
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov clean --workspace
      - name: Rust tests
        run: cargo test
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - uses: astral-sh/setup-uv@v8.2.0
      - name: MOSEK-backed Python tests
        env:
          MSK_LICENSE: ${{ secrets.MSK_LICENSE }}
        run: |
          echo "$MSK_LICENSE" > "$HOME/mosek.lic"
          MOSEKLM_LICENSE_FILE="$HOME/mosek.lic" uv run python -c \
            "from ncpoleon.utils import is_mosek_available; assert is_mosek_available(), 'MOSEK license checkout failed'"
          MOSEKLM_LICENSE_FILE="$HOME/mosek.lic" uv run --all-extras --dev --config-setting 'build-args=--profile=dev' pytest -x --cov=ncpoleon --cov-report xml
      - name: Generate LCOV report
        run: cargo llvm-cov report --lcov --output-path coverage.lcov
      - uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          override_pr: ${{ github.event.number }}
          override_commit: ${{ github.event.pull_request.head.sha }}
          files: coverage.lcov,coverage.xml